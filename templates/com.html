<!DOCTYPE html>
<html>
    <body>
        <title>Completed Tasks</title>
        <link rel="stylesheet" href="{{ url_for('static',filename='style.css')}}">
        <div class="nav-bar">
            <div class="task-btn" ><a href="/">📋Taskly</a></div>
            <div class="view-btn"><a href="/view">👁️View Tasks</a></div>
            <div class="pen-btn"><a href="/pen">⏳Pending Tasks</a></div>
            <div class="com-btn"><a href="/com">✅Completed Task</a></div>
        </div>
        <div class="view-task">
            <h2>Completed Tasks</h2>

            <table border="1" cellpadding="8" cellspacing="0">
                <thead>
                    <tr>
                        <th style="text-align: center;">#</th>
                        <th style="text-align: center;">Task</th>
                        <th style="text-align: center;">action</th>
                        
                    </tr>
                </thead>
            <tbody>
                {% for i in com_tasks %}
                <tr>
                    <td style="text-align: center;">{{ i[0] }}</td>
                    <td style="text-align: center;">{{ i[1] }}</td>
                    <td style="text-align: center;"><a class="btn-delete" href="/deletecom/{{ i[0] }}"><span id="emoji-delete">🗑️</span>Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
            </table>
    </body>
</html>
